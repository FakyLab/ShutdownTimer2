name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      jobs:
        description: 'Which jobs to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - appimage-only
          - deb-only
          - windows-only
          - macos-only

# Required for softprops/action-gh-release to create releases
permissions:
  contents: write

jobs:

  # ── Windows ───────────────────────────────────────────────────────────────────
  release-windows:
    name: Windows — Portable ZIP
    runs-on: windows-latest
    if: github.event_name == 'push' || inputs.jobs == 'all' || inputs.jobs == 'windows-only'

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        run: |
          mkdir deploy
          windeployqt --dir deploy build\Release\ShutdownTimer.exe
          copy build\Release\ShutdownTimer.exe deploy\
          xcopy /E /I build\Release\i18n deploy\i18n
          copy LICENSE.txt deploy\

      - name: Build portable ZIP
        shell: pwsh
        run: Compress-Archive -Path deploy\* -DestinationPath ShutdownTimer-${{ github.ref_name }}-Windows-x64-Portable.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ShutdownTimer-${{ github.ref_name }}-Windows-x64-Portable.zip
          generate_release_notes: true

  # ── Linux AppImage ─────────────────────────────────────────────────────────────
  # ubuntu-22.04 — ubuntu-20.04 runners are no longer available
  release-linux-appimage:
    name: Linux — AppImage
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || inputs.jobs == 'all' || inputs.jobs == 'appimage-only'

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-l10n-tools \
            libgl1-mesa-dev \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 \
            fuse libfuse2 patchelf file

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Download linuxdeploy and Qt plugin
        run: |
          # linuxdeploy + linuxdeploy-plugin-qt are the actively maintained
          # successors to the abandoned linuxdeployqt. They support Qt6.
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          for size in 16 24 32 48 64 128 256 512; do
            mkdir -p AppDir/usr/share/icons/hicolor/${size}x${size}/apps
          done
          cp build/ShutdownTimer AppDir/usr/bin/ShutdownTimer
          mkdir -p AppDir/usr/share/shutdowntimer/i18n
          cp build/i18n/*.qm AppDir/usr/share/shutdowntimer/i18n/
          cp packaging/appimage/shutdowntimer.desktop AppDir/usr/share/applications/shutdowntimer.desktop
          # Icons named to match desktop file Icon=org.fakylab.ShutdownTimer
          cp assets/shutdown16px.png  AppDir/usr/share/icons/hicolor/16x16/apps/org.fakylab.ShutdownTimer.png
          cp assets/shutdown24px.png  AppDir/usr/share/icons/hicolor/24x24/apps/org.fakylab.ShutdownTimer.png
          cp assets/shutdown32px.png  AppDir/usr/share/icons/hicolor/32x32/apps/org.fakylab.ShutdownTimer.png
          cp assets/shutdown48px.png  AppDir/usr/share/icons/hicolor/48x48/apps/org.fakylab.ShutdownTimer.png
          cp assets/shutdown64px.png  AppDir/usr/share/icons/hicolor/64x64/apps/org.fakylab.ShutdownTimer.png
          cp assets/shutdown128px.png AppDir/usr/share/icons/hicolor/128x128/apps/org.fakylab.ShutdownTimer.png
          cp assets/shutdown256px.png AppDir/usr/share/icons/hicolor/256x256/apps/org.fakylab.ShutdownTimer.png
          cp assets/shutdown512px.png AppDir/usr/share/icons/hicolor/512x512/apps/org.fakylab.ShutdownTimer.png
          # Root-level icon and .DirIcon required by linuxdeploy
          cp assets/shutdown512px.png AppDir/org.fakylab.ShutdownTimer.png
          cp assets/shutdown512px.png AppDir/.DirIcon
          mkdir -p AppDir/usr/share/doc/shutdowntimer
          cp LICENSE.txt AppDir/usr/share/doc/shutdowntimer/copyright
          cp packaging/appimage/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        env:
          # Tell linuxdeploy-plugin-qt which qmake to use for Qt6
          QMAKE: /usr/bin/qmake6
          # Needed for linuxdeploy to find Qt plugins
          QT_QPA_PLATFORM: offscreen
          # Output verbosity — shows all deployed files and errors clearly
          LINUXDEPLOY_OUTPUT_VERBOSITY: 2
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/shutdowntimer.desktop \
            --plugin qt \
            --output appimage \
            --verbosity=2
          # linuxdeploy names the output from the desktop Name= field — find and rename
          APPIMAGE=$(find . -maxdepth 1 -name "*.AppImage" ! -name "linuxdeploy*" | head -1)
          echo "Found AppImage: $APPIMAGE"
          if [ -z "$APPIMAGE" ]; then
            echo "ERROR: AppImage not produced. Contents of current dir:"
            ls -la
            exit 1
          fi
          mv "$APPIMAGE" ShutdownTimer-${{ github.ref_name }}-Linux-x86_64.AppImage

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ShutdownTimer-${{ github.ref_name }}-Linux-x86_64.AppImage

  # ── Linux .deb ─────────────────────────────────────────────────────────────────
  release-linux-deb:
    name: Linux — .deb Package
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || inputs.jobs == 'all' || inputs.jobs == 'deb-only'

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-l10n-tools \
            libgl1-mesa-dev \
            lintian

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Assemble .deb package tree
        run: |
          VERSION=${{ github.ref_name }}
          DEB_VERSION=${VERSION#v}
          PKG=shutdowntimer_${DEB_VERSION}_amd64

          cp -r packaging/deb $PKG
          sed -i "s/^Version:.*/Version: ${DEB_VERSION}/" $PKG/DEBIAN/control

          # Main executable
          mkdir -p $PKG/usr/bin
          cp build/ShutdownTimer $PKG/usr/bin/ShutdownTimer

          # Translations
          mkdir -p $PKG/usr/share/shutdowntimer/i18n
          cp build/i18n/*.qm $PKG/usr/share/shutdowntimer/i18n/

          # Icons
          for size in 16 24 32 48 64 128 256; do
            mkdir -p $PKG/usr/share/icons/hicolor/${size}x${size}/apps
          done
          cp assets/shutdown16px.png  $PKG/usr/share/icons/hicolor/16x16/apps/shutdowntimer.png
          cp assets/shutdown24px.png  $PKG/usr/share/icons/hicolor/24x24/apps/shutdowntimer.png
          cp assets/shutdown32px.png  $PKG/usr/share/icons/hicolor/32x32/apps/shutdowntimer.png
          cp assets/shutdown48px.png  $PKG/usr/share/icons/hicolor/48x48/apps/shutdowntimer.png
          cp assets/shutdown64px.png  $PKG/usr/share/icons/hicolor/64x64/apps/shutdowntimer.png
          cp assets/shutdown128px.png $PKG/usr/share/icons/hicolor/128x128/apps/shutdowntimer.png
          cp assets/shutdown256px.png $PKG/usr/share/icons/hicolor/256x256/apps/shutdowntimer.png

          cp packaging/deb/usr/share/applications/shutdowntimer.desktop \
             $PKG/usr/share/applications/shutdowntimer.desktop

          mkdir -p $PKG/usr/share/doc/shutdowntimer
          cp LICENSE.txt $PKG/usr/share/doc/shutdowntimer/copyright

          chmod 755 $PKG/DEBIAN/postinst $PKG/DEBIAN/prerm $PKG/DEBIAN/postrm

          dpkg-deb --build --root-owner-group $PKG
          mv ${PKG}.deb ShutdownTimer-${{ github.ref_name }}-Linux-x64.deb

          lintian --no-tag-display-limit ShutdownTimer-${{ github.ref_name }}-Linux-x64.deb || true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ShutdownTimer-${{ github.ref_name }}-Linux-x64.deb

  # ── macOS x86_64 (Intel) ───────────────────────────────────────────────────────
  release-macos-x64:
    name: macOS — DMG + ZIP (Intel x86_64)
    runs-on: macos-15-intel      # Intel x86_64 runner (macos-13 retired Dec 2025)
    if: github.event_name == 'push' || inputs.jobs == 'all' || inputs.jobs == 'macos-only'

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Find app bundle
        run: |
          echo "=== All .app bundles ==="
          find . -name "*.app" -type d 2>/dev/null || echo "none found"
          echo "=== Build directory contents ==="
          ls -la build/
          ls -la build/Release/ 2>/dev/null || echo "No Release subdir"

      - name: Deploy Qt runtime into .app bundle
        run: |
          APP=$(find build -name "ShutdownTimer.app" -type d 2>/dev/null | head -1)
          echo "App bundle: $APP"
          if [ -z "$APP" ]; then
            echo "ERROR: App bundle not found. Build contents:"
            find build -type f -name "ShutdownTimer*" 2>/dev/null
            exit 1
          fi
          macdeployqt "$APP"
          cp LICENSE.txt "$APP/Contents/Resources/"
          mkdir -p "$APP/Contents/Resources/i18n"
          find build -name "*.qm" -exec cp {} "$APP/Contents/Resources/i18n/" \;
          # Copy icon.icns into the bundle — referenced by CFBundleIconFile=icon in Info.plist.
          # Must happen BEFORE codesign — modifying the bundle after signing invalidates it.
          cp assets/icon.icns "$APP/Contents/Resources/icon.icns"
          # Strip quarantine xattr BEFORE signing. If quarantine is present on the
          # bundle when we sign it, Gatekeeper sees an ad-hoc-signed quarantined app
          # and shows "app is damaged" instead of letting it run.
          xattr -cr "$APP"

      - name: Ad-hoc code sign
        run: |
          # Sign AFTER all bundle contents are finalised and quarantine is stripped.
          # Ad-hoc signing (-) requires no Developer account or certificate.
          # --deep signs all nested frameworks and dylibs bundled by macdeployqt.
          # --force re-signs any components already signed by macdeployqt itself.
          APP=$(find build -name "ShutdownTimer.app" -type d | head -1)
          codesign --deep --force --sign - "$APP"
          echo "Signed: $APP"
          codesign --verify --verbose "$APP"

      - name: Build .dmg
        run: |
          APP=$(find build -name "ShutdownTimer.app" -type d | head -1)
          create-dmg \
            --volname "Shutdown Timer" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ShutdownTimer.app" 175 190 \
            --hide-extension "ShutdownTimer.app" \
            --app-drop-link 425 190 \
            "ShutdownTimer-${{ github.ref_name }}-macOS-x86_64.dmg" \
            "$APP"

      - name: Build .zip
        run: |
          APP=$(find build -name "ShutdownTimer.app" -type d | head -1)
          APPDIR=$(dirname "$APP")
          # Use ditto instead of zip — ditto preserves code signatures and resource forks.
          # Plain zip can corrupt extended attributes and break Gatekeeper verification.
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP" \
            "$GITHUB_WORKSPACE/ShutdownTimer-${{ github.ref_name }}-macOS-x86_64.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ShutdownTimer-${{ github.ref_name }}-macOS-x86_64.dmg
            ShutdownTimer-${{ github.ref_name }}-macOS-x86_64.zip

  # ── macOS arm64 (Apple Silicon) ────────────────────────────────────────────────
  release-macos-arm64:
    name: macOS — DMG + ZIP (Apple Silicon arm64)
    runs-on: macos-14      # macos-14+ = Apple Silicon arm64
    if: github.event_name == 'push' || inputs.jobs == 'all' || inputs.jobs == 'macos-only'

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'    # Qt installer uses clang_64 for both; CMake targets the runner arch

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Find app bundle
        run: |
          echo "=== All .app bundles ==="
          find . -name "*.app" -type d 2>/dev/null || echo "none found"
          echo "=== Build directory contents ==="
          ls -la build/
          ls -la build/Release/ 2>/dev/null || echo "No Release subdir"

      - name: Deploy Qt runtime into .app bundle
        run: |
          APP=$(find build -name "ShutdownTimer.app" -type d 2>/dev/null | head -1)
          echo "App bundle: $APP"
          if [ -z "$APP" ]; then
            echo "ERROR: App bundle not found. Build contents:"
            find build -type f -name "ShutdownTimer*" 2>/dev/null
            exit 1
          fi
          macdeployqt "$APP"
          cp LICENSE.txt "$APP/Contents/Resources/"
          mkdir -p "$APP/Contents/Resources/i18n"
          find build -name "*.qm" -exec cp {} "$APP/Contents/Resources/i18n/" \;
          # Copy icon.icns into the bundle — referenced by CFBundleIconFile=icon in Info.plist.
          # Must happen BEFORE codesign — modifying the bundle after signing invalidates it.
          cp assets/icon.icns "$APP/Contents/Resources/icon.icns"
          # Strip quarantine xattr BEFORE signing. If quarantine is present on the
          # bundle when we sign it, Gatekeeper sees an ad-hoc-signed quarantined app
          # and shows "app is damaged" instead of letting it run.
          xattr -cr "$APP"

      - name: Ad-hoc code sign
        run: |
          # Sign AFTER all bundle contents are finalised and quarantine is stripped.
          # Ad-hoc signing (-) requires no Developer account or certificate.
          # --deep signs all nested frameworks and dylibs bundled by macdeployqt.
          # --force re-signs any components already signed by macdeployqt itself.
          APP=$(find build -name "ShutdownTimer.app" -type d | head -1)
          codesign --deep --force --sign - "$APP"
          echo "Signed: $APP"
          codesign --verify --verbose "$APP"

      - name: Build .dmg
        run: |
          APP=$(find build -name "ShutdownTimer.app" -type d | head -1)
          create-dmg \
            --volname "Shutdown Timer" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ShutdownTimer.app" 175 190 \
            --hide-extension "ShutdownTimer.app" \
            --app-drop-link 425 190 \
            "ShutdownTimer-${{ github.ref_name }}-macOS-arm64.dmg" \
            "$APP"

      - name: Build .zip
        run: |
          APP=$(find build -name "ShutdownTimer.app" -type d | head -1)
          # Use ditto instead of zip — ditto preserves code signatures and resource forks.
          # Plain zip can corrupt extended attributes and break Gatekeeper verification.
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP" \
            "$GITHUB_WORKSPACE/ShutdownTimer-${{ github.ref_name }}-macOS-arm64.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ShutdownTimer-${{ github.ref_name }}-macOS-arm64.dmg
            ShutdownTimer-${{ github.ref_name }}-macOS-arm64.zip
