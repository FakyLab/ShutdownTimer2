<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow the helper to own its bus name on the system bus -->
  <policy user="root">
    <allow own="org.fakylab.ShutdownTimerHelper"/>
  </policy>

  <!-- Allow any user to call methods — PolicyKit enforces authorization -->
  <policy context="default">
    <allow send_destination="org.fakylab.ShutdownTimerHelper"
           send_interface="org.fakylab.ShutdownTimerHelper"/>
  </policy>
</busconfig>
