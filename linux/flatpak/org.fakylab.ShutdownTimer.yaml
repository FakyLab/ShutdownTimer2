app-id: org.fakylab.ShutdownTimer
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: ShutdownTimer

# Flatpak sandbox permissions
finish-args:
  # X11 + Wayland display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Talk to our privileged D-Bus helper for login message operations
  - --system-talk-name=org.fakylab.ShutdownTimerHelper
  # Talk to logind for shutdown/restart/sleep/hibernate
  - --system-talk-name=org.freedesktop.login1
  # Allow notifications
  - --talk-name=org.freedesktop.Notifications

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: ShutdownTimer
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: git
        url: https://github.com/FakyLab/ShutdownTimer.git
        tag: v1.0.0
        # Update this commit hash to match the tag before submitting to Flathub:
        # commit: <git rev-parse v1.0.0>
